<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>PDF Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #e5e5e5; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }
  .no-scroll::-webkit-scrollbar { display: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .row { animation: fadeUp 0.28s ease-out forwards; }

  @keyframes bounce3 {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-5px); opacity:1; }
  }
  .dot1 { animation: bounce3 1.2s infinite; }
  .dot2 { animation: bounce3 1.2s infinite 0.2s; }
  .dot3 { animation: bounce3 1.2s infinite 0.4s; }

  .prog-fill { transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* Prose styles inside bubbles */
  .prose-msg p { margin-bottom: 10px; }
  .prose-msg p:last-child { margin-bottom: 0; }
  .prose-msg strong { color: #fff; font-weight: 600; }
  .prose-msg em { font-style: italic; color: #ccc; }
  .prose-msg ul { list-style: disc; padding-left: 18px; margin: 8px 0; }
  .prose-msg ol { list-style: decimal; padding-left: 18px; margin: 8px 0; }
  .prose-msg li { margin-bottom: 4px; }
  .prose-msg h1 { font-size: 17px; font-weight: 700; color: #fff; margin: 14px 0 6px; }
  .prose-msg h2 { font-size: 15px; font-weight: 600; color: #fff; margin: 12px 0 5px; }
  .prose-msg h3 { font-size: 14px; font-weight: 600; color: #ddd; margin: 10px 0 4px; }
  .prose-msg code { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 1px 6px; font-family: 'ui-monospace', monospace; font-size: 12px; color: #e06c75; }
  .prose-msg hr { border: none; border-top: 1px solid #2a2a2a; margin: 12px 0; }
  .prose-msg a { color: #10b981; text-decoration: underline; }

  .glow-ring:focus-within .ring-el { opacity: 1 !important; }
</style>
</head>
<body class="h-screen flex flex-col overflow-hidden" style="height:100dvh">

<!-- ══════════════════════════════
     MOBILE TOPBAR
══════════════════════════════ -->
<header class="md:hidden flex items-center justify-between px-4 py-3 bg-[#111] border-b border-white/8 z-50 shrink-0" style="padding-top: max(12px, env(safe-area-inset-top))">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-black font-bold text-sm">P</div>
    <span class="font-semibold text-sm tracking-tight">PDF Chat</span>
  </div>
  <div class="flex items-center gap-2">
    <div id="mobilePill" class="hidden items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-full">
      <span class="text-emerald-400 text-[10px]">📄</span>
      <span class="text-emerald-400 text-[10px] font-semibold truncate max-w-[90px]" id="pillName"></span>
    </div>
    <button onclick="openDrawer()" class="p-2 text-white/50 hover:text-white transition-colors rounded-lg hover:bg-white/5">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</header>

<!-- ══════════════════════════════
     LAYOUT
══════════════════════════════ -->
<div class="flex flex-1 overflow-hidden min-h-0">

  <!-- DESKTOP SIDEBAR -->
  <aside class="hidden md:flex w-72 shrink-0 flex-col bg-[#111] border-r border-white/8 p-6">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-9 h-9 bg-emerald-500 rounded-xl flex items-center justify-center text-black font-bold text-base shadow-lg shadow-emerald-500/20">P</div>
      <h1 class="text-base font-bold tracking-tight">PDF Chat</h1>
    </div>

    <div class="flex-1 overflow-y-auto no-scroll space-y-8">
      <!-- Upload -->
      <div class="space-y-3">
        <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 px-1 block">Document</label>
        <input type="file" id="fileInput" accept=".pdf" class="hidden"/>
        <button id="uploadBtn" class="w-full group flex items-center gap-3 p-4 rounded-xl border border-dashed border-white/10 hover:border-emerald-500/50 hover:bg-emerald-500/5 transition-all text-sm text-white/40 hover:text-emerald-400">
          <svg class="shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span class="font-medium">Upload PDF</span>
        </button>

        <div id="pdfCard" class="hidden items-center gap-3 p-3 bg-emerald-500/8 border border-emerald-500/20 rounded-xl">
          <div class="w-8 h-8 bg-emerald-500/15 rounded-lg flex items-center justify-center text-emerald-400 shrink-0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <p id="pdfName" class="text-xs font-semibold truncate text-white"></p>
            <p id="pdfMeta" class="text-[10px] text-white/30 mt-0.5"></p>
          </div>
          <button onclick="removePDF()" class="text-white/20 hover:text-red-400 transition-colors p-1 rounded">✕</button>
        </div>

        <div id="progWrap" class="hidden px-1 space-y-2">
          <div class="flex justify-between text-[10px] font-bold text-white/30 uppercase tracking-wider">
            <span id="progLabel">Reading…</span>
            <span id="progPct">0%</span>
          </div>
          <div class="h-0.5 bg-white/5 rounded-full overflow-hidden">
            <div id="progFill" class="h-full bg-emerald-500 shadow-[0_0_8px_#10b981] prog-fill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 px-1 block">Quick Prompts</label>
        <button onclick="use('Summarize the main points of this document')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm text-white/40 hover:bg-white/5 hover:text-white transition-all">📋 Summarize PDF</button>
        <button onclick="use('What is the key conclusion?')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm text-white/40 hover:bg-white/5 hover:text-white transition-all">🔍 Key Conclusion</button>
        <button onclick="use('List any important data or statistics')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm text-white/40 hover:bg-white/5 hover:text-white transition-all">📊 Data & Stats</button>
        <button onclick="use('What are the main arguments made?')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm text-white/40 hover:bg-white/5 hover:text-white transition-all">💡 Main Arguments</button>
        <button onclick="use('What topics are covered in this document?')" class="w-full text-left px-3 py-2.5 rounded-lg text-sm text-white/40 hover:bg-white/5 hover:text-white transition-all">🗂️ Topics Covered</button>
      </div>
    </div>

    <!-- API Key -->
    <div class="mt-6 pt-5 border-t border-white/5 space-y-3">
      <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 px-1 block">Gemini API Key</label>
      <div class="relative">
        <input type="password" id="apiKey" placeholder="AIzaSy…"
          class="w-full bg-[#1a1a1a] border border-white/8 rounded-xl px-4 py-2.5 text-xs font-mono focus:border-emerald-500/40 focus:ring-1 focus:ring-emerald-500/20 outline-none transition-all pr-10 text-white placeholder:text-white/20"/>
        <button onclick="toggleKey()" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/60 transition-colors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="flex items-center gap-2 px-1">
        <div id="kDot" class="w-1.5 h-1.5 rounded-full bg-white/10 transition-all duration-300"></div>
        <span id="kText" class="text-[10px] text-white/25 font-medium">No key configured</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="flex-1 flex flex-col relative overflow-hidden">
    <!-- Messages -->
    <div id="msgs" class="flex-1 overflow-y-auto" style="padding-bottom: 140px">
      <!-- Welcome -->
      <div id="welcome" class="h-full min-h-[400px] flex flex-col items-center justify-center p-8 text-center gap-6">
        <div class="w-20 h-20 bg-emerald-500/5 border border-emerald-500/10 rounded-3xl flex items-center justify-center shadow-inner">
          <svg class="text-emerald-500" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="space-y-2 max-w-md">
          <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Intelligence for your PDFs</h2>
          <p class="text-sm text-white/30">Upload any document and ask questions, extract data, or get summaries instantly.</p>
        </div>
        <div class="flex flex-wrap gap-2 justify-center mt-2">
          <div class="flex items-center gap-2 px-4 py-2 bg-white/4 border border-white/6 rounded-full text-xs text-white/40">
            <span class="w-5 h-5 flex items-center justify-center bg-emerald-500 text-black font-bold rounded-full text-[10px]">1</span> Upload PDF
          </div>
          <div class="flex items-center gap-2 px-4 py-2 bg-white/4 border border-white/6 rounded-full text-xs text-white/40">
            <span class="w-5 h-5 flex items-center justify-center bg-emerald-500 text-black font-bold rounded-full text-[10px]">2</span> Add API Key
          </div>
          <div class="flex items-center gap-2 px-4 py-2 bg-white/4 border border-white/6 rounded-full text-xs text-white/40">
            <span class="w-5 h-5 flex items-center justify-center bg-emerald-500 text-black font-bold rounded-full text-[10px]">3</span> Ask Anything
          </div>
        </div>
      </div>
    </div>

    <!-- Input (sticky bottom) -->
    <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6" style="background: linear-gradient(to top, #0d0d0d 70%, transparent); padding-bottom: max(16px, env(safe-area-inset-bottom))">
      <div class="max-w-3xl mx-auto glow-ring relative group">
        <div class="ring-el absolute -inset-px bg-gradient-to-r from-emerald-500/20 to-blue-500/10 rounded-2xl blur opacity-0 transition-opacity duration-300 pointer-events-none"></div>
        <div class="relative bg-[#171717] border border-white/10 rounded-2xl flex items-end gap-2 p-2 pl-4 focus-within:border-white/20 transition-all">
          <textarea id="qi" rows="1" placeholder="Ask anything about your PDF…"
            oninput="resize(this)" onkeydown="onKey(event)"
            class="flex-1 bg-transparent border-none outline-none text-white text-[15px] placeholder:text-white/20 resize-none max-h-36 py-3 leading-relaxed"></textarea>
          <button id="sbtn" onclick="send()" disabled
            class="p-3 bg-emerald-500 rounded-xl text-black hover:bg-emerald-400 disabled:bg-white/5 disabled:text-white/15 transition-all shadow-lg shadow-emerald-500/10 shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <p class="text-center text-[10px] text-white/15 font-semibold uppercase tracking-[0.18em] mt-3 hidden md:block">Powered by Gemini AI</p>
    </div>
  </main>
</div>

<!-- ══════════════════════════════
     MOBILE OVERLAY + DRAWER
══════════════════════════════ -->
<div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeDrawer()"></div>

<div id="drawer" class="fixed bottom-0 left-0 right-0 bg-[#111] border-t border-white/8 rounded-t-3xl z-[70] translate-y-full transition-transform duration-300 md:hidden flex flex-col max-h-[88vh]" style="padding-bottom: env(safe-area-inset-bottom)">
  <div class="w-10 h-1 bg-white/10 rounded-full mx-auto mt-3 mb-1 shrink-0"></div>
  <div class="flex items-center justify-between px-5 py-3 border-b border-white/5 shrink-0">
    <h3 class="font-bold text-base text-white">Settings</h3>
    <button onclick="closeDrawer()" class="text-white/30 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition-all">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="overflow-y-auto flex-1 px-5 py-5 space-y-7 no-scroll">
    <!-- Mobile Upload -->
    <div class="space-y-3">
      <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 block">Document</label>
      <button id="mobileUploadBtn" class="w-full flex items-center justify-center gap-3 p-4 bg-white/4 border border-white/10 rounded-2xl text-sm font-medium text-white/70 hover:bg-white/8 hover:text-white active:scale-95 transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Upload PDF
      </button>

      <div id="mobilePdfCard" class="hidden items-center gap-3 p-3 bg-emerald-500/8 border border-emerald-500/20 rounded-xl mt-3">
        <div class="w-8 h-8 bg-emerald-500/15 rounded-lg flex items-center justify-center text-emerald-400 shrink-0">📄</div>
        <div class="flex-1 min-w-0">
          <div class="text-xs font-semibold text-white truncate" id="mobilePdfName"></div>
          <div class="text-[10px] text-white/30 mt-0.5" id="mobilePdfMeta"></div>
        </div>
        <button onclick="removePDF()" class="text-white/20 hover:text-red-400 p-1 transition-colors">✕</button>
      </div>

      <div id="mobileProgWrap" class="hidden space-y-2 px-1">
        <div class="flex justify-between text-[10px] font-bold text-white/30 uppercase">
          <span id="mobileProgLabel">Reading…</span>
          <span id="mobileProgPct">0%</span>
        </div>
        <div class="h-0.5 bg-white/5 rounded-full overflow-hidden">
          <div id="mobileProgFill" class="h-full bg-emerald-500 shadow-[0_0_8px_#10b981] prog-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Mobile Quick Prompts -->
    <div class="space-y-2">
      <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 block">Quick Prompts</label>
      <button onclick="mUse('Summarize the main points of this document')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all active:scale-95">📋 Summarize PDF</button>
      <button onclick="mUse('What is the key conclusion?')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all active:scale-95">🔍 Key Conclusion</button>
      <button onclick="mUse('List any important data or statistics')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all active:scale-95">📊 Data & Stats</button>
      <button onclick="mUse('What are the main arguments made?')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all active:scale-95">💡 Main Arguments</button>
      <button onclick="mUse('What topics are covered in this document?')" class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all active:scale-95">🗂️ Topics Covered</button>
    </div>

    <!-- Mobile API Key -->
    <div class="space-y-3">
      <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-white/25 block">Gemini API Key</label>
      <div class="relative">
        <input type="password" id="mobileApiKey" placeholder="AIzaSy…"
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-mono text-white placeholder:text-white/20 focus:border-emerald-500/50 outline-none transition-all pr-10"/>
        <button onclick="toggleMobileKey()" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/60 transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="flex items-center gap-2">
        <div id="mkDot" class="w-1.5 h-1.5 rounded-full bg-white/10 transition-all duration-300"></div>
        <span id="mkText" class="text-[11px] text-white/30">No key configured</span>
      </div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfText='', busy=false;
const fi=document.getElementById('fileInput');

// Upload buttons
document.getElementById('uploadBtn').onclick=()=>fi.click();
document.getElementById('mobileUploadBtn').onclick=()=>fi.click();
fi.onchange=()=>{if(fi.files[0])load(fi.files[0]);};

async function load(file){
  pdfText='';
  ['pdfCard','mobilePdfCard'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('mobilePill').classList.add('hidden');
  showProg(true); setP(5,'Loading…');
  try{
    const buf=await file.arrayBuffer();
    setP(20,'Parsing pages…');
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const n=pdf.numPages; let txt='';
    for(let i=1;i<=n;i++){
      const pg=await pdf.getPage(i);
      const c=await pg.getTextContent();
      txt+=`\n\n--- Page ${i} ---\n`+c.items.map(x=>x.str).join(' ');
      setP(20+Math.round(i/n*75),`Page ${i} of ${n}`);
    }
    pdfText=txt.trim(); setP(100,'Ready!');
    const meta=`${n} page${n!==1?'s':''} · ${(file.size/1024).toFixed(0)} KB`;

    // Desktop card
    document.getElementById('pdfName').textContent=file.name;
    document.getElementById('pdfMeta').textContent=meta;
    document.getElementById('pdfCard').classList.replace('hidden','flex');

    // Mobile card
    document.getElementById('mobilePdfName').textContent=file.name;
    document.getElementById('mobilePdfMeta').textContent=meta;
    document.getElementById('mobilePdfCard').classList.replace('hidden','flex');

    // Mobile topbar pill
    document.getElementById('pillName').textContent=file.name;
    document.getElementById('mobilePill').classList.replace('hidden','flex');

    setTimeout(()=>showProg(false),800);
    upd(); closeDrawer();
    notice(`✅ <b>${file.name}</b> — ${n} pages loaded`);
  }catch(e){showProg(false);err('Could not read PDF. Make sure it is valid and not encrypted.');}
}

function removePDF(){
  pdfText=''; fi.value='';
  ['pdfCard','mobilePdfCard'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('mobilePill').classList.add('hidden');
  upd();
}

function showProg(s){
  document.getElementById('progWrap').classList.toggle('hidden',!s);
  document.getElementById('mobileProgWrap').classList.toggle('hidden',!s);
}
function setP(p,l){
  [['progFill','progLabel','progPct'],['mobileProgFill','mobileProgLabel','mobileProgPct']].forEach(([f,lb,pt])=>{
    const fe=document.getElementById(f), le=document.getElementById(lb), pe=document.getElementById(pt);
    if(fe)fe.style.width=p+'%';
    if(le)le.textContent=l;
    if(pe)pe.textContent=p+'%';
  });
}

// API Key sync
const ki=document.getElementById('apiKey');
const mki=document.getElementById('mobileApiKey');

function syncKey(val){
  ki.value=val; mki.value=val;
  const ok=val.startsWith('AIza')&&val.length>20;
  const color=ok?'#10b981':(val?'#ef4444':'rgba(255,255,255,0.1)');
  const shadow=ok?'0 0 8px #10b981':'none';
  ['kDot','mkDot'].forEach(id=>{
    const d=document.getElementById(id);
    d.style.backgroundColor=color; d.style.boxShadow=shadow;
  });
  const txt=ok?'Key Ready':(val?'Invalid Key':'No key configured');
  ['kText','mkText'].forEach(id=>document.getElementById(id).textContent=txt);
  upd();
}
ki.oninput=()=>syncKey(ki.value.trim());
mki.oninput=()=>syncKey(mki.value.trim());

function toggleKey(){ki.type=ki.type==='password'?'text':'password';}
function toggleMobileKey(){mki.type=mki.type==='password'?'text':'password';}

function upd(){
  document.getElementById('sbtn').disabled=!(ki.value.trim().length>10&&pdfText)||busy;
}

// Drawer
function openDrawer(){
  const o=document.getElementById('overlay'), d=document.getElementById('drawer');
  o.classList.remove('hidden');
  requestAnimationFrame(()=>{ o.style.opacity='1'; d.style.transform='translateY(0)'; });
}
function closeDrawer(){
  const o=document.getElementById('overlay'), d=document.getElementById('drawer');
  o.style.opacity='0'; d.style.transform='translateY(100%)';
  setTimeout(()=>o.classList.add('hidden'),300);
}

// Swipe to close
let ty=0;
document.getElementById('drawer').addEventListener('touchstart',e=>ty=e.touches[0].clientY,{passive:true});
document.getElementById('drawer').addEventListener('touchmove',e=>{ if(e.touches[0].clientY-ty>60)closeDrawer(); },{passive:true});

// Input
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,144)+'px';}
function use(t){const q=document.getElementById('qi');q.value=t;resize(q);q.focus();}
function mUse(t){use(t);closeDrawer();}

// Send
async function send(){
  const qi=document.getElementById('qi'), q=qi.value.trim();
  if(!q||busy)return;
  const key=ki.value.trim();
  if(!key){err('Enter your Gemini API key (open ☰ menu on mobile or sidebar on desktop).');return;}
  if(!pdfText){err('Upload a PDF first.');return;}
  document.getElementById('welcome')?.remove();
  addRow('user',q);
  qi.value=''; qi.style.height='auto';
  busy=true; upd();
  const typing=addTyping();
  try{
    const doc=pdfText.length>35000?pdfText.slice(0,35000)+'\n[...truncated]':pdfText;
    const prompt=`You are a helpful assistant. Answer the user's question based only on the provided PDF document content. Use markdown formatting where helpful (bold, lists, headings). If the answer is not in the document, say so clearly.\n\nPDF Content:\n<document>\n${doc}\n</document>\n\nQuestion: ${q}`;
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:2048}})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const ans=d.candidates?.[0]?.content?.parts?.[0]?.text||'No response generated.';
    typing.remove(); addRow('ai',ans);
  }catch(e){typing.remove();err('Error: '+e.message);}
  finally{busy=false;upd();}
}

// Message helpers
function addRow(role,text){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className=`row flex w-full px-4 mb-5 ${role==='user'?'justify-end':'justify-start'}`;
  const bubble=role==='user'
    ?`<div class="max-w-[85%] md:max-w-2xl px-5 py-4 rounded-2xl bg-[#1e1e1e] border border-white/6 text-white text-[15px] leading-relaxed">${mdEscape(text)}</div>`
    :`<div class="max-w-[92%] md:max-w-2xl px-5 py-4 rounded-2xl bg-[#161616] border border-white/5 shadow-xl text-white/85 text-[15px] leading-relaxed">
        <div class="text-[9px] font-bold uppercase tracking-[0.2em] text-white/20 mb-2">AI</div>
        <div class="prose-msg">${md(text)}</div>
      </div>`;
  d.innerHTML=bubble;
  w.appendChild(d);
  w.scrollTo({top:w.scrollHeight,behavior:'smooth'});
  return d;
}

function addTyping(){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='row flex w-full px-4 mb-5 justify-start';
  d.innerHTML=`<div class="px-5 py-4 rounded-2xl bg-[#161616] border border-white/5 flex items-center gap-1.5">
    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full dot1"></div>
    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full dot2"></div>
    <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full dot3"></div>
  </div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight; return d;
}

function notice(html){
  const w=document.getElementById('msgs');
  document.getElementById('welcome')?.remove();
  const d=document.createElement('div');
  d.className='row flex justify-center my-5 px-4';
  d.innerHTML=`<div class="bg-emerald-500/5 border border-emerald-500/15 text-emerald-400 text-[11px] font-semibold uppercase tracking-wider px-4 py-2 rounded-full">${html}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function err(text){
  const w=document.getElementById('msgs');
  document.getElementById('welcome')?.remove();
  const d=document.createElement('div');
  d.className='row flex justify-center my-5 px-4';
  d.innerHTML=`<div class="bg-red-500/8 border border-red-500/20 text-red-400 text-xs px-5 py-3 rounded-xl max-w-sm text-center">⚠️ ${text}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

// Markdown renderer (full)
function md(raw){
  if(!raw)return'';
  let t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t=t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t=t.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  t=t.replace(/^---$/gm,'<hr>');
  const lines=t.split('\n'); const out=[]; let list=null;
  for(const line of lines){
    if(/^[-*] /.test(line)){
      if(list!=='ul'){if(list)out.push(`</${list}>`);out.push('<ul>');list='ul';}
      out.push(`<li>${line.replace(/^[-*] /,'')}</li>`);
    }else if(/^\d+\. /.test(line)){
      if(list!=='ol'){if(list)out.push(`</${list}>`);out.push('<ol>');list='ol';}
      out.push(`<li>${line.replace(/^\d+\. /,'')}</li>`);
    }else{
      if(list){out.push(`</${list}>`);list=null;}
      if(line.startsWith('<h')||line.startsWith('<hr'))out.push(line);
      else if(line.trim()==='')out.push('');
      else out.push(`<p>${line}</p>`);
    }
  }
  if(list)out.push(`</${list}>`);
  return out.join('');
}

// User messages — no markdown, just escape + newlines
function mdEscape(raw){
  if(!raw)return'';
  return raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
