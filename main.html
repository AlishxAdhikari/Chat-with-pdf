<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-bg: #171717;
  --sidebar-width: 260px;
  --main-bg: #212121;
  --input-bg: #2f2f2f;
  --border: #3a3a3a;
  --text: #ececec;
  --text-muted: #8e8ea0;
  --text-dim: #4a4a5a;
  --accent: #19c37d;
  --hover: #2a2a2a;
  --radius: 12px;
}

body {
  font-family: 'ui-sans-serif', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--main-bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  height: 100vh;
  border-right: 1px solid #2a2a2a;
}

.sidebar-header {
  padding: 14px 14px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #2a2a2a;
}

.logo-box {
  width: 30px; height: 30px;
  background: white; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.logo-title { font-size: 15px; font-weight: 600; color: var(--text); }

.sidebar-body { flex: 1; overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 14px; }
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--text-muted); padding: 0 4px; margin-bottom: 6px;
}

/* Upload */
.upload-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; background: none;
  border: 1px dashed var(--border); border-radius: 9px;
  color: var(--text-muted); cursor: pointer; font-size: 13px;
  font-family: inherit; text-align: left; transition: all 0.15s;
}
.upload-btn:hover { background: var(--hover); border-color: #555; color: var(--text); }
.upload-btn.drag-over { border-color: var(--accent); color: var(--accent); }
#fileInput { display: none; }

.pdf-card {
  display: none; align-items: center; gap: 9px;
  padding: 9px 11px; background: #1e1e1e;
  border: 1px solid var(--border); border-radius: 9px;
}
.pdf-card.show { display: flex; }
.pdf-card-text { flex: 1; min-width: 0; }
.pdf-card-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pdf-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.pdf-rm { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; padding: 2px 5px; border-radius: 4px; }
.pdf-rm:hover { color: #ff6b6b; }

.progress-wrap { display: none; }
.progress-wrap.show { display: block; }
.progress-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.prog-bar { height: 2px; background: #333; border-radius: 2px; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

/* Suggestions */
.sugg-btn {
  display: block; width: 100%; text-align: left;
  padding: 8px 10px; background: none; border: none;
  border-radius: 7px; color: var(--text-muted); cursor: pointer;
  font-size: 12.5px; font-family: inherit; transition: all 0.15s;
}
.sugg-btn:hover { background: var(--hover); color: var(--text); }

/* API section at bottom */
.sidebar-footer { padding: 10px 12px 14px; border-top: 1px solid #2a2a2a; }
.footer-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 7px; display: block; }
.key-wrap { position: relative; }
.key-input {
  width: 100%; background: #1e1e1e; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 32px 8px 10px;
  font-size: 12px; font-family: 'ui-monospace', monospace;
  color: var(--text); outline: none; transition: border-color 0.15s;
}
.key-input:focus { border-color: #555; }
.key-input::placeholder { color: var(--text-dim); }
.key-eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; }
.key-status { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11.5px; color: var(--text-muted); }
.k-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; flex-shrink: 0; }
.k-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.messages { flex: 1; overflow-y: auto; }
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100%; padding: 60px 24px;
  text-align: center; gap: 14px;
}
.welcome-icon { font-size: 42px; }
.welcome h1 { font-size: 26px; font-weight: 600; }
.welcome p { font-size: 14px; color: var(--text-muted); max-width: 400px; line-height: 1.65; }
.w-steps { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.w-step { display: flex; align-items: center; gap: 7px; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px; font-size: 13px; color: var(--text-muted); }
.w-num { width: 17px; height: 17px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #000; }

/* Message rows */
.row { animation: fadeup 0.22s ease; }
@keyframes fadeup { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.row-inner { max-width: 740px; margin: 0 auto; padding: 16px 24px; display: flex; gap: 14px; align-items: flex-start; }

.av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; margin-top: 2px; font-weight: 700;
}
.row.user .av { background: #5436da; color: white; font-size: 12px; }
.row.ai   .av { background: var(--accent); color: #000; font-size: 13px; }

.body { flex: 1; min-width: 0; padding-top: 2px; color: var(--text); }

/* Markdown */
.body p { margin-bottom: 10px; }
.body p:last-child { margin-bottom: 0; }
.body strong { font-weight: 600; color: #fff; }
.body em { font-style: italic; }
.body ul, .body ol { padding-left: 22px; margin: 8px 0; }
.body li { margin-bottom: 4px; }
.body h1 { font-size: 18px; font-weight: 600; color:#fff; margin: 14px 0 6px; }
.body h2 { font-size: 16px; font-weight: 600; color:#fff; margin: 12px 0 5px; }
.body h3 { font-size: 15px; font-weight: 600; color:#fff; margin: 10px 0 4px; }
.body code { background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: 'ui-monospace', monospace; font-size: 13px; color: #e06c75; }
.body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* typing */
.dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: blink 1.2s infinite ease-in-out; }
.dots span:nth-child(2) { animation-delay:.2s; }
.dots span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,60%,100%{opacity:.3;transform:scale(.85);} 30%{opacity:1;transform:scale(1);} }

.err-box { background: rgba(220,60,60,.1); border:1px solid rgba(220,60,60,.3); border-radius:8px; padding:10px 14px; font-size:13.5px; color:#ff8a8a; }
.notice { font-size:13px; color:var(--text-muted); }

/* Input */
.input-area { padding: 10px 16px 20px; }
.input-box {
  max-width: 740px; margin: 0 auto;
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 14px; display: flex; align-items: flex-end;
  gap: 8px; padding: 10px 10px 10px 16px; transition: border-color .15s;
}
.input-box:focus-within { border-color: #555; }
#qi {
  flex:1; background:none; border:none; outline:none;
  font-family:inherit; font-size:15px; color:var(--text);
  resize:none; max-height:160px; min-height:26px; line-height:1.6;
}
#qi::placeholder { color:var(--text-dim); }
.sbtn {
  width:34px; height:34px; border-radius:9px; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:var(--accent); color:#000; transition:all .15s; flex-shrink:0;
}
.sbtn:hover { background:#1adb8c; }
.sbtn:active { transform:scale(.93); }
.sbtn:disabled { background:#333; color:var(--text-dim); cursor:not-allowed; transform:none; }
.hint { max-width:740px; margin:7px auto 0; font-size:11.5px; color:var(--text-dim); text-align:center; }

@media(max-width:600px){ .sidebar{display:none;} .row-inner{padding:14px 14px;} }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-box">📄</div>
    <span class="logo-title">PDF Chat</span>
  </div>

  <div class="sidebar-body">
    <!-- Upload -->
    <div>
      <div class="section-label">Document</div>
      <button class="upload-btn" id="uploadBtn">
        <span>📂</span><span>Upload a PDF</span>
      </button>
      <input type="file" id="fileInput" accept=".pdf"/>

      <div class="pdf-card" id="pdfCard" style="margin-top:8px">
        <span style="font-size:18px">📄</span>
        <div class="pdf-card-text">
          <div class="pdf-card-name" id="pdfName"></div>
          <div class="pdf-card-meta" id="pdfMeta"></div>
        </div>
        <button class="pdf-rm" onclick="removePDF()">✕</button>
      </div>

      <div class="progress-wrap" id="progWrap" style="margin-top:8px">
        <div class="progress-top"><span id="progLabel">Reading…</span><span id="progPct">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      </div>
    </div>

    <!-- Suggestions -->
    <div>
      <div class="section-label">Quick Prompts</div>
      <button class="sugg-btn" onclick="use('Summarize the main points of this document')">📋 Summarize main points</button>
      <button class="sugg-btn" onclick="use('What is the key conclusion?')">🔍 Key conclusion</button>
      <button class="sugg-btn" onclick="use('List any important data or statistics')">📊 Data & statistics</button>
      <button class="sugg-btn" onclick="use('What are the main arguments made?')">💡 Main arguments</button>
      <button class="sugg-btn" onclick="use('What topics are covered?')">🗂️ Topics covered</button>
    </div>
  </div>

  <!-- API Key footer -->
  <div class="sidebar-footer">
    <span class="footer-label">Gemini API Key</span>
    <div class="key-wrap">
      <input class="key-input" type="password" id="apiKey" placeholder="AIzaSy…" autocomplete="off"/>
      <button class="key-eye" onclick="toggleKey()">👁</button>
    </div>
    <div class="key-status">
      <div class="k-dot" id="kDot"></div>
      <span id="kText">No key entered</span>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="messages" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>Chat with your PDF</h1>
      <p>Upload a PDF, add your free Gemini API key, then ask anything about the document.</p>
      <div class="w-steps">
        <div class="w-step"><div class="w-num">1</div>Upload PDF</div>
        <div class="w-step"><div class="w-num">2</div>Add API Key</div>
        <div class="w-step"><div class="w-num">3</div>Ask questions</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="qi" placeholder="Ask anything about your PDF…" rows="1"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfText='', busy=false;

// Upload
const ub=document.getElementById('uploadBtn'), fi=document.getElementById('fileInput');
ub.onclick=()=>fi.click();
ub.ondragover=e=>{e.preventDefault();ub.classList.add('drag-over');};
ub.ondragleave=()=>ub.classList.remove('drag-over');
ub.ondrop=e=>{e.preventDefault();ub.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')load(f);};
fi.onchange=()=>{if(fi.files[0])load(fi.files[0]);};

async function load(file){
  pdfText='';
  document.getElementById('pdfCard').classList.remove('show');
  prog(true);setP(5,'Loading…');
  try{
    const buf=await file.arrayBuffer();
    setP(20,'Parsing pages…');
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const n=pdf.numPages; let txt='';
    for(let i=1;i<=n;i++){
      const pg=await pdf.getPage(i);
      const c=await pg.getTextContent();
      txt+=`\n\n--- Page ${i} ---\n`+c.items.map(x=>x.str).join(' ');
      setP(20+Math.round(i/n*75),`Page ${i} of ${n}…`);
    }
    pdfText=txt.trim();setP(100,'Done!');
    document.getElementById('pdfName').textContent=file.name;
    document.getElementById('pdfMeta').textContent=`${n} page${n!==1?'s':''} · ${(file.size/1024).toFixed(0)} KB`;
    document.getElementById('pdfCard').classList.add('show');
    setTimeout(()=>prog(false),500);
    upd();
    notice(`✅ <strong>${file.name}</strong> loaded — ${n} pages ready.`);
  }catch(e){prog(false);err('Could not read PDF. Make sure it is a valid, non-encrypted file.');}
}
function removePDF(){pdfText='';fi.value='';document.getElementById('pdfCard').classList.remove('show');upd();}
function prog(s){document.getElementById('progWrap').classList.toggle('show',s);}
function setP(p,l){document.getElementById('progFill').style.width=p+'%';document.getElementById('progLabel').textContent=l;document.getElementById('progPct').textContent=p+'%';}

// Key
const ki=document.getElementById('apiKey');
ki.oninput=()=>{
  const v=ki.value.trim(),ok=v.startsWith('AIza')&&v.length>20;
  document.getElementById('kDot').classList.toggle('ok',ok);
  document.getElementById('kText').textContent=ok?'Key ready':(v?'Looks invalid':'No key entered');
  upd();
};
function toggleKey(){ki.type=ki.type==='password'?'text':'password';}

function upd(){document.getElementById('sbtn').disabled=!(ki.value.trim().length>10&&pdfText)||busy;}

// Input
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function use(t){const q=document.getElementById('qi');q.value=t;q.focus();}

async function send(){
  const qi=document.getElementById('qi'),q=qi.value.trim();
  if(!q||busy)return;
  const key=ki.value.trim();
  if(!key){err('Enter your Gemini API key in the sidebar.');return;}
  if(!pdfText){err('Upload a PDF first.');return;}
  document.getElementById('welcome')?.remove();
  addRow('user',q);
  qi.value='';qi.style.height='auto';
  busy=true;upd();
  const t=addTyping();
  try{
    const doc=pdfText.length>30000?pdfText.slice(0,30000)+'\n\n[...truncated]':pdfText;
    const prompt=`You are a helpful assistant. Answer based only on the provided PDF document. Use markdown formatting (bold, lists, headings) where helpful. If the answer isn't in the document, say so clearly.\n\nPDF Content:\n<document>\n${doc}\n</document>\n\nQuestion: ${q}`;
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:2048}})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const ans=d.candidates?.[0]?.content?.parts?.[0]?.text||'No response.';
    t.remove();addRow('ai',ans);
  }catch(e){t.remove();err('Error: '+e.message);}
  finally{busy=false;upd();}
}

function addRow(role,text){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='row '+role;
  d.innerHTML=`<div class="row-inner"><div class="av">${role==='user'?'U':'✦'}</div><div class="body">${md(text)}</div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;return d;
}
function addTyping(){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='row ai';
  d.innerHTML=`<div class="row-inner"><div class="av">✦</div><div class="body"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;return d;
}
function notice(html){
  const w=document.getElementById('msgs');
  document.getElementById('welcome')?.remove();
  const d=document.createElement('div');d.className='row ai';
  d.innerHTML=`<div class="row-inner"><div class="av">📄</div><div class="body"><div class="notice">${html}</div></div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}
function err(text){
  const w=document.getElementById('msgs');
  document.getElementById('welcome')?.remove();
  const d=document.createElement('div');d.className='row ai';
  d.innerHTML=`<div class="row-inner"><div class="av" style="background:#c0392b">!</div><div class="body"><div class="err-box">${text}</div></div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}

function md(raw){
  if(!raw)return'';
  let t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t=t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t=t.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  t=t.replace(/^---$/gm,'<hr>');
  const lines=t.split('\n');const out=[];let list=null;
  for(const line of lines){
    if(/^[-*] /.test(line)){
      if(list!=='ul'){if(list)out.push(`</${list}>`);out.push('<ul>');list='ul';}
      out.push(`<li>${line.replace(/^[-*] /,'')}</li>`);
    }else if(/^\d+\. /.test(line)){
      if(list!=='ol'){if(list)out.push(`</${list}>`);out.push('<ol>');list='ol';}
      out.push(`<li>${line.replace(/^\d+\. /,'')}</li>`);
    }else{
      if(list){out.push(`</${list}>`);list=null;}
      if(line.startsWith('<h')||line.startsWith('<hr'))out.push(line);
      else if(line.trim()==='')out.push('');
      else out.push(`<p>${line}</p>`);
    }
  }
  if(list)out.push(`</${list}>`);
  return out.join('');
}
</script>
</body>
</html>
